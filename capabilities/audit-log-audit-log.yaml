naftiko: 1.0.0-alpha2
info:
  label: Socket Audit Log Audit Log
  description: Socket audit log audit log business capability. Self-contained Naftiko capability covering one Socket business surface.
  tags:
  - Socket
  - Supply Chain Security
  - Audit
  - Log
  - Audit
  - Log
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SOCKET_API_KEY: SOCKET_API_KEY
capability:
  consumes:
  - type: http
    namespace: audit-log-audit-log
    baseUri: https://api.socket.dev/v0
    description: Socket audit log audit log business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org-slug-audit-log
      path: /orgs/{org_slug}/audit-log
      operations:
      - name: get-orgs-org-slug-audit-log
        method: GET
        description: Get Audit Log Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_slug
          in: path
          type: string
          description: The slug of the organization
          required: true
        - name: type
          in: query
          type: string
          description: Filter audit log events by type. Omit for all types.
          required: false
        - name: per_page
          in: query
          type: integer
          description: Number of events per page
          required: false
        - name: page
          in: query
          type: string
          description: Page token
          required: false
        - name: from
          in: query
          type: string
          description: A Unix timestamp in seconds to filter results prior to this date.
          required: false
    authentication:
      type: basic
      username: '{{env.SOCKET_API_KEY}}'
      password: ''
      description: Socket authenticates via HTTP Basic with the API key as the username and empty password.
  exposes:
  - type: rest
    namespace: audit-log-audit-log-rest
    port: 8080
    description: REST adapter for Socket audit log audit log.
    resources:
    - path: /v1/orgs/{org_slug}/audit-log
      name: orgs-org-slug-audit-log
      description: REST surface for orgs-org-slug-audit-log.
      operations:
      - method: GET
        name: get-orgs-org-slug-audit-log
        description: Get Audit Log Events
        call: audit-log-audit-log.get-orgs-org-slug-audit-log
        with:
          org_slug: rest.path.org_slug
          type: rest.query.type
          per_page: rest.query.per_page
          page: rest.query.page
          from: rest.query.from
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: audit-log-audit-log-mcp
    port: 9090
    transport: http
    description: MCP adapter for Socket audit log audit log.
    tools:
    - name: socket-get-orgs-org-slug-audit-log
      description: Get Audit Log Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: audit-log-audit-log.get-orgs-org-slug-audit-log
      with:
        org_slug: tools.org_slug
        type: tools.type
        per_page: tools.per_page
        page: tools.page
        from: tools.from
      outputParameters:
      - type: object
        mapping: $.
