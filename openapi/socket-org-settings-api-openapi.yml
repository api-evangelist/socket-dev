    post:
      tags:
      - security-policy
      summary: Update Security Policy
      operationId: updateOrgSecurityPolicy
      parameters:
      - name: org_slug
        in: path
        required: true
        description: The slug of the organization
        schema:
          type: string
      - name: custom_rules_only
        in: query
        required: false
        description: Return only customized security policy rules in the response.
        schema:
          type: boolean
          default: false
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                policyDefault:
                  type: string
                  enum:
                  - default
                  - low
                  - medium
                  - high
                  description: The default security policy for the organization
                policyRules:
                  type: object
                  additionalProperties: false
                  properties:
                    gptSecurity:
                      type: object
                      additionalProperties: false
                      description: ''
                      properties:
                        action:
                          type: string
                          enum:
                          - defer
                          - error
                          - warn
                          - monitor
                          - ignore
                          description: The action to take for gptSecurity issues.
                      required:
